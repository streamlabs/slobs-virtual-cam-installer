name: Mac Release

on: [push]

env:
  InstallPath: "obs-studio-node"
  RELEASE_BUCKET: "obsstudionodes3.streamlabs.com" # Reuse the OSN bucket
  SLDistributeDirectory: distribute
  SLFullDistributePath: "distribute"
  PACKAGE_NAME: slobs-vcam-installer

jobs:
  mac_release:
    name: "Release Version"
    runs-on: "macos-13"
    strategy:
      matrix:
        arch: ["x86_64", "arm64"]
        BuildReleases: [Release-x86_64, Release-arm64]
        include:
          - BuildReleases: Release-x86_64
            image: macos-13
            BuildConfig: RelWithDebInfo
            ReleaseName: release
            Architecture: x86_64
          - BuildReleases: Release-arm64
            image: macos-14
            BuildConfig: RelWithDebInfo
            ReleaseName: release
            Architecture: arm64
    env:
      OS_TAG: "osx"
    steps:
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT
        shell: bash
      - name: Check out repository
        uses: actions/checkout@v3
      - name: Set Up Code Signing 🔑
        uses: ./.github/actions/setup-macos-codesigning
        id: codesign
        with:
          codesignIdentity: ${{ secrets.APPLE_TEAM_ID }}
          codesignCertificate: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
          certificatePassword: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          keychainPassword: ${{ secrets.APPLE_DEVELOPER_KEYCHAIN_PASSWORD }}
          provisioningProfile: ${{ secrets.APPLE_DEVELOPER_PROVISIONING_PROFILE }}
      - name: "Release"
        run: |
          ./build.sh
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CI: true
          ARCH: ${{ matrix.arch }}
      - name: Tar artifact for deployment
        if: startsWith(github.ref, 'refs/tags/')
        run: tar -cvzf ${{env.TARGET_ARTIFACT}}.tar.gz -C ${{env.SLFullDistributePath}} ${{env.InstallPath}}
        env:
          TARGET_ARTIFACT: ${{env.PACKAGE_NAME}}-${{ steps.get_version.outputs.VERSION }}-${{matrix.ReleaseName}}-${{env.OS_TAG}}-${{matrix.Architecture}}
      - name: Configure AWS credentials
        if: startsWith(github.ref, 'refs/tags/')
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{secrets.AWS_RELEASE_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_RELEASE_SECRET_ACCESS_KEY}}
          aws-region: us-west-2
      - name: Deploy
        if: startsWith(github.ref, 'refs/tags/')
        run: aws s3 cp ${{env.TARGET_ARTIFACT}}.tar.gz s3://${{env.RELEASE_BUCKET}} --acl public-read
        env:
          TARGET_ARTIFACT: ${{env.PACKAGE_NAME}}-${{ steps.get_version.outputs.VERSION }}-${{matrix.ReleaseName}}-${{env.OS_TAG}}-${{matrix.Architecture}}
