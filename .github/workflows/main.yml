name: Mac Release

on: [push]

jobs:
  mac_release:
    name: "Release Version ${{ github.event.inputs.version }}"
    runs-on: "macos-13"
    strategy:
      matrix:
        arch: ["x86_64", "arm64"]
    steps:
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
      - uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
      - uses: actions/checkout@v4
      - name: "Install Dependencies"
        run: yarn install --frozen-lockfile --check-files 2>&1
      - name: Add Python 2 to PYTHON_PATH
        run: echo "PYTHON_PATH=$(which python2)" >> $GITHUB_ENV
      - name: "Release"
        run: ./build.sh
        env:
          SLOBS_RELEASE_VERSION: ${{ github.event.inputs.version }}
          APPLE_ASC_PROVIDER: ${{ secrets.APPLE_ASC_PROVIDER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CI: true
          ARCH: ${{ matrix.arch }}
